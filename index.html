    <meta property="og:description" content="Portfolio of Garvit Singh, a Software Product Engineering student building practical backend and full-stack products with modern web technologies." data-seo-managed="true" />
    <meta property="og:type" content="website" data-seo-managed="true" />
    <meta property="og:url" content="https://garvitsingh171.com/" data-seo-managed="true" />

    <meta property="og:locale" content="en_IN" data-seo-managed="true" />
    <meta name="twitter:card" content="summary_large_image" data-seo-managed="true" />
    <meta name="twitter:title" content="Garvit Singh — Backend & Full-Stack Developer" data-seo-managed="true" />

    <!-- seo:end -->
    <script>
      (function () {
        var storageKey = "garvit-theme";
        var storedTheme = null;

        try {
          storedTheme = window.localStorage.getItem(storageKey);
        } catch (error) {
          storedTheme = null;
        }

        var prefersDark = window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = storedTheme === "light" || storedTheme === "dark"
          ? storedTheme
          : prefersDark
            ? "dark"
            : "light";

        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.style.colorScheme = theme;

        var themeColor = document.querySelector('meta[name="theme-color"]');

        if (themeColor) {
          themeColor.setAttribute(
            "content",
            theme === "dark" ? "#11130f" : "#f7f7f3"
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
